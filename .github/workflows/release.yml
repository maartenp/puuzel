name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust SDK extension
        run: flatpak install -y --noninteractive flathub org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build Flatpak
        id: flatter
        uses: andyholmes/flatter@main
        with:
          files: flatpak/io.github.maartenp.puuzel.yml
          upload-pages-artifact: false

      - name: Write version.txt into pages directory
        run: |
          echo "${{ github.ref_name }}" | sed 's/^v//' > version.txt
          cp version.txt ${{ steps.flatter.outputs.repo }}/version.txt

      - name: Upload Pages artifact with version.txt included
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.flatter.outputs.repo }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
