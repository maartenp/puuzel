name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust SDK extension
        run: flatpak install -y --noninteractive flathub org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Build Flatpak
        id: flatter
        uses: andyholmes/flatter@main
        with:
          files: flatpak/io.github.maartenp.puuzel.yml
          flatpak-builder-args: --default-branch=stable
          upload-pages-artifact: true
          gpg-sign: 2134A870B71CDF83

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release with .flatpakref
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' "${{ github.ref_name }}")
          NOTES="${COMMIT_MSG}

          Download the .flatpakref file and double-click to install on Linux."
          gh release create "${{ github.ref_name }}" \
            io.github.maartenp.puuzel.flatpakref \
            --title "Puuzel ${{ github.ref_name }}" \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
