name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/andyholmes/flatter/freedesktop:24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust SDK extension
        run: flatpak install -y --noninteractive flathub org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Build Flatpak
        id: flatter
        uses: andyholmes/flatter@main
        with:
          files: flatpak/io.github.maartenp.puuzel.yml
          flatpak-builder-args: --default-branch=stable
          upload-pages-artifact: true
          gpg-sign: 2134A870B71CDF83

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package Windows distribution
        shell: bash
        run: |
          mkdir -p puuzel-windows/data
          cp target/release/puuzel.exe puuzel-windows/
          cp data/puuzel.db puuzel-windows/data/
          cp data/DejaVuSans.ttf puuzel-windows/data/

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path puuzel-windows/* -DestinationPath puuzel-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: puuzel-windows.zip

  release:
    needs: [build-flatpak, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create GitHub Release
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' "${{ github.ref_name }}")
          NOTES="${COMMIT_MSG}

          **Windows:** Download \`puuzel-windows.zip\`, extract, and run \`puuzel.exe\`.
          **Linux:** Download the \`.flatpakref\` file and double-click to install."
          gh release create "${{ github.ref_name }}" \
            io.github.maartenp.puuzel.flatpakref \
            puuzel-windows.zip \
            --title "Puuzel ${{ github.ref_name }}" \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-flatpak
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
